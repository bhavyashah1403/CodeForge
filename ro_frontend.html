<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OptionsAI — Institutional Intelligence for Every Trader</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #050508;
    --bg-card: #0c0c14;
    --bg-card2: #111120;
    --bg-hover: #181830;
    --border: rgba(100,100,180,0.15);
    --border-glow: rgba(99,102,241,0.4);
    --accent: #6366f1;
    --accent2: #22d3ee;
    --accent3: #f59e0b;
    --accent-red: #ef4444;
    --accent-green: #10b981;
    --accent-yellow: #f59e0b;
    --text-primary: #f1f1f8;
    --text-secondary: #8888aa;
    --text-muted: #444466;
    --gold: #d4af37;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --font-body: 'Inter', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  #bg-canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  #root { position: relative; z-index: 1; }

  /* ── NAVBAR ── */
  .navbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px;
    background: rgba(5,5,8,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }

  /* FIX 1: Added background-clip alongside -webkit-background-clip (Line 68 fix) */
  .nav-logo {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 800;
    background: linear-gradient(135deg, #6366f1, #22d3ee);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .nav-logo span {
    color: var(--accent3);
    -webkit-text-fill-color: var(--accent3);
  }

  .nav-center { display: flex; gap: 4px; }

  .nav-tab {
    padding: 8px 18px; border-radius: 8px;
    font-family: var(--font-mono); font-size: 12px; font-weight: 500;
    color: var(--text-secondary); cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    background: none;
  }
  .nav-tab:hover { color: var(--text-primary); background: var(--bg-card2); }
  .nav-tab.active {
    color: var(--accent2); background: rgba(34,211,238,0.08);
    border-color: rgba(34,211,238,0.25);
  }

  .nav-right { display: flex; align-items: center; gap: 12px; }

  .lang-btn {
    padding: 6px 14px; border-radius: 6px;
    font-family: var(--font-mono); font-size: 11px;
    color: var(--text-secondary); cursor: pointer;
    border: 1px solid var(--border); background: none;
    transition: all 0.2s;
  }
  .lang-btn:hover, .lang-btn.active {
    color: var(--accent); border-color: var(--accent);
    background: rgba(99,102,241,0.1);
  }

  .live-badge {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: 11px; color: var(--accent-green);
  }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent-green);
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
  }

  /* ── BACKEND STATUS BANNER ── */
  .status-banner {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px;
    font-family: var(--font-mono); font-size: 11px;
    border-bottom: 1px solid var(--border);
  }
  .status-banner.offline {
    background: rgba(245,158,11,0.08);
    color: var(--accent-yellow);
  }
  .status-banner.online {
    background: rgba(16,185,129,0.08);
    color: var(--accent-green);
  }

  /* ── MAIN LAYOUT ── */
  .main { display: flex; min-height: calc(100vh - 65px); }

  .sidebar {
    width: 260px; min-width: 260px;
    background: var(--bg-card);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    display: flex; flex-direction: column; gap: 20px;
  }

  .filter-group label {
    display: block; font-family: var(--font-mono);
    font-size: 10px; font-weight: 500; letter-spacing: 1px;
    color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px;
  }

  .filter-select, .filter-input {
    width: 100%; padding: 10px 14px; border-radius: 8px;
    background: var(--bg-card2); border: 1px solid var(--border);
    color: var(--text-primary); font-family: var(--font-mono); font-size: 12px;
    outline: none; transition: border-color 0.2s;
    cursor: pointer;
  }
  .filter-select:focus, .filter-input:focus { border-color: var(--accent); }
  .filter-select option { background: var(--bg-card2); }

  .sidebar-divider { height: 1px; background: var(--border); margin: 4px 0; }

  .stat-mini { display: flex; flex-direction: column; gap: 8px; }
  .stat-mini-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 12px; border-radius: 8px; background: var(--bg-card2);
    border: 1px solid var(--border);
  }
  .stat-mini-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .stat-mini-value { font-family: var(--font-mono); font-size: 13px; font-weight: 500; color: var(--text-primary); }

  .refresh-btn {
    width: 100%; padding: 11px; border-radius: 8px;
    background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(34,211,238,0.1));
    border: 1px solid var(--border-glow); color: var(--accent2);
    font-family: var(--font-mono); font-size: 12px; font-weight: 500;
    cursor: pointer; letter-spacing: 0.5px; transition: all 0.2s;
  }
  .refresh-btn:hover { background: rgba(99,102,241,0.3); transform: translateY(-1px); }

  /* ── CONTENT AREA ── */
  .content { flex: 1; padding: 24px; overflow-y: auto; }

  /* ── PAGE HEADER ── */
  .page-header { margin-bottom: 24px; }

  /* FIX 2: Added background-clip alongside -webkit-background-clip (Line 178 fix) */
  .page-title {
    font-family: var(--font-display); font-size: 28px; font-weight: 700;
    background: linear-gradient(135deg, #f1f1f8, #8888aa);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  .page-subtitle { font-size: 13px; color: var(--text-secondary); }

  /* ── CHART GRID ── */
  .chart-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 16px;
  }
  .chart-grid.two-col { grid-template-columns: repeat(2, 1fr); }
  .chart-grid.full { grid-template-columns: 1fr; }

  /* ── CARDS ── */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    transition: border-color 0.3s, transform 0.2s;
    animation: fadeInUp 0.4s ease both;
  }
  .card:hover { border-color: rgba(99,102,241,0.3); }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .card-title {
    font-family: var(--font-display); font-size: 13px; font-weight: 600;
    color: var(--text-primary); letter-spacing: 0.3px;
  }
  .card-badge {
    font-family: var(--font-mono); font-size: 10px; padding: 3px 8px;
    border-radius: 4px; font-weight: 500;
  }
  .badge-live { background: rgba(16,185,129,0.15); color: var(--accent-green); border: 1px solid rgba(16,185,129,0.3); }
  .badge-ai   { background: rgba(99,102,241,0.15); color: var(--accent);       border: 1px solid rgba(99,102,241,0.3); }
  .badge-ml   { background: rgba(34,211,238,0.15); color: var(--accent2);      border: 1px solid rgba(34,211,238,0.3); }
  .badge-mock { background: rgba(245,158,11,0.15); color: var(--accent3);      border: 1px solid rgba(245,158,11,0.3); }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    display: flex; gap: 12px; flex-wrap: wrap;
    padding: 4px 8px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px; margin-top: 16px;
    animation: fadeInUp 0.4s ease both;
  }
  .bstat {
    flex: 1; min-width: 110px;
    display: flex; flex-direction: column; gap: 4px;
    padding: 10px 14px;
    border-right: 1px solid var(--border);
  }
  .bstat:last-child { border-right: none; }
  .bstat-label  { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); letter-spacing: 0.8px; }
  .bstat-value  { font-family: var(--font-mono); font-size: 17px; font-weight: 500; color: var(--text-primary); }
  .bstat-value.green { color: var(--accent-green); }
  .bstat-value.red   { color: var(--accent-red); }
  .bstat-value.gold  { color: var(--gold); }

  /* ── FINGERPRINT ── */
  .similarity-card {
    background: var(--bg-card2);
    border: 1px solid var(--border-glow);
    border-radius: 12px; padding: 18px; margin-bottom: 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .similarity-card:hover { border-color: var(--accent); background: var(--bg-hover); }
  .sim-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .sim-date  { font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); }
  .sim-score { font-family: var(--font-mono); font-size: 20px; font-weight: 500; color: var(--accent); }
  .sim-bar-bg   { height: 4px; background: var(--bg-deep); border-radius: 2px; margin-top: 8px; }
  .sim-bar-fill { height: 4px; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }

  /* ── TRAP DETECTOR ── */
  .trap-banner {
    border-radius: 12px; padding: 20px 24px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 16px;
    animation: fadeInUp 0.3s ease;
  }
  .trap-banner.GREEN { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); }
  .trap-banner.YELLOW { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); }
  .trap-banner.RED {
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
    animation: pulse-border 2s infinite;
  }
  @keyframes pulse-border {
    0%, 100% { border-color: rgba(239,68,68,0.3); }
    50% { border-color: rgba(239,68,68,0.7); box-shadow: 0 0 20px rgba(239,68,68,0.2); }
  }
  .trap-icon { font-size: 32px; }
  .trap-text h3 { font-family: var(--font-display); font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .trap-text.GREEN h3 { color: var(--accent-green); }
  .trap-text.YELLOW h3 { color: var(--accent-yellow); }
  .trap-text.RED h3   { color: var(--accent-red); }
  .trap-text p { font-size: 13px; color: var(--text-secondary); }

  .trap-item {
    background: var(--bg-card2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px; margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .crowding-bar  { width: 80px; height: 6px; background: var(--bg-deep); border-radius: 3px; overflow: hidden; }
  .crowding-fill { height: 6px; border-radius: 3px; }

  /* ── AI CHAT ── */
  .ai-chat-container { display: flex; flex-direction: column; gap: 12px; }
  .ai-message {
    padding: 14px 18px; border-radius: 12px;
    font-size: 13px; line-height: 1.6;
    animation: fadeInUp 0.3s ease;
  }
  .ai-message.ai {
    background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2);
    color: var(--text-primary); align-self: flex-start; max-width: 90%;
  }
  .ai-message.user {
    background: var(--bg-card2); border: 1px solid var(--border);
    color: var(--text-secondary); align-self: flex-end; max-width: 80%;
    text-align: right;
  }
  .ai-input-row { display: flex; gap: 8px; margin-top: 12px; }
  .ai-input {
    flex: 1; padding: 12px 16px; border-radius: 10px;
    background: var(--bg-card2); border: 1px solid var(--border);
    color: var(--text-primary); font-family: var(--font-body); font-size: 13px;
    outline: none; transition: border-color 0.2s;
  }
  .ai-input:focus { border-color: var(--accent); }
  .ai-send-btn {
    padding: 12px 20px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #818cf8);
    border: none; color: white; cursor: pointer;
    font-family: var(--font-mono); font-size: 12px; font-weight: 500;
    transition: all 0.2s; letter-spacing: 0.5px;
  }
  .ai-send-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(99,102,241,0.4); }
  .ai-send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ── ANOMALY ── */
  .anomaly-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-radius: 10px;
    background: var(--bg-card2); border: 1px solid var(--border);
    margin-bottom: 8px; transition: all 0.2s;
  }
  .anomaly-item:hover { border-color: var(--accent); }
  .anomaly-strike {
    font-family: var(--font-mono); font-size: 16px; font-weight: 500;
    color: var(--accent2); min-width: 70px;
  }
  .anomaly-type-badge {
    font-family: var(--font-mono); font-size: 10px; padding: 3px 8px; border-radius: 4px;
  }
  .anomaly-type-badge.HIGH_OI     { background: rgba(99,102,241,0.15); color: var(--accent); }
  .anomaly-type-badge.HIGH_VOLUME { background: rgba(245,158,11,0.15);  color: var(--accent3); }
  .anomaly-scores { margin-left: auto; display: flex; gap: 12px; }
  .anomaly-score-item { text-align: right; }
  .anomaly-score-label { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); }
  .anomaly-score-val   { font-family: var(--font-mono); font-size: 13px; }

  /* ── LOADING ── */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 200px; gap: 12px;
    font-family: var(--font-mono); font-size: 12px; color: var(--text-muted);
  }
  .loading-spinner {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-deep); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* ── GLOW ── */
  .glow-accent { box-shadow: 0 0 30px rgba(99,102,241,0.15); }

  /* ── OUTCOME ROW ── */
  .outcome-row { display: flex; gap: 12px; margin-top: 12px; }
  .outcome-box {
    flex: 1; background: var(--bg-card2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; text-align: center;
  }
  .outcome-box-label { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.8px; }
  .outcome-box-val   { font-family: var(--font-mono); font-size: 15px; font-weight: 500; }

  /* ── HISTORY TABLE ── */
  .history-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .history-table th {
    font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);
    text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border);
    letter-spacing: 0.8px;
  }
  .history-table td {
    padding: 10px 12px; border-bottom: 1px solid rgba(100,100,180,0.08);
    font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary);
  }
  .history-table tr:hover td { background: var(--bg-card2); }

  /* ── BUTTONS ── */
  .analyze-btn {
    padding: 12px 28px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; color: white; cursor: pointer;
    font-family: var(--font-display); font-size: 14px; font-weight: 600;
    transition: all 0.2s; letter-spacing: 0.3px;
  }
  .analyze-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99,102,241,0.4); }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .suggestion-btn {
    padding: 6px 12px; border-radius: 8px; cursor: pointer;
    background: var(--bg-card2); border: 1px solid var(--border);
    color: var(--text-secondary); font-size: 11px; font-family: var(--font-mono);
    transition: all 0.2s;
  }
  .suggestion-btn:hover { border-color: var(--accent); color: var(--text-primary); }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const BASE_URL = "http://localhost:8000";

// ── MOCK DATA (used when backend is offline) ─────────────────────────────────
const STRIKES = Array.from({ length: 31 }, (_, i) => 21000 + i * 100);
const EXPIRIES = ["2025-01-30", "2025-02-27", "2025-03-27"];
const SPOT = 22480;
const ATM = 22500;

function mockIVCurve() {
  return {
    strikes: STRIKES,
    iv: STRIKES.map(s => {
      const m = (s - SPOT) / SPOT;
      return +(0.18 + 0.05 * m * m + (Math.random() * 0.01)).toFixed(4);
    }),
    expiry: EXPIRIES[0],
  };
}

function mockSurface() {
  const z = EXPIRIES.map((_, ei) =>
    STRIKES.map(s => {
      const m = (s - SPOT) / SPOT;
      return +(0.17 + ei * 0.01 + 0.05 * m * m).toFixed(4);
    })
  );
  return { strikes: STRIKES, expiries: EXPIRIES, z };
}

function mockOIDist() {
  return {
    strikes: STRIKES,
    call_oi: STRIKES.map(s => Math.max(0, Math.round(8000 * Math.exp(-0.5 * ((s - ATM) / 400) ** 2) + Math.random() * 500))),
    put_oi:  STRIKES.map(s => Math.max(0, Math.round(7500 * Math.exp(-0.5 * ((s - ATM) / 400) ** 2) + Math.random() * 500))),
  };
}

function mockHeatmap() {
  const times = Array.from({ length: 20 }, (_, i) => `2025-01-15 ${String(9 + Math.floor(i * 0.75)).padStart(2,'0')}:${String((i * 45) % 60).padStart(2,'0')}`);
  const strikes = STRIKES.filter((_, i) => i % 3 === 0);
  const values = times.map(() => strikes.map(() => Math.round(Math.random() * 5000)));
  return { timestamps: times, strikes, values };
}

function mockPCR() {
  const times = Array.from({ length: 30 }, (_, i) => `2025-01-15 ${String(9 + Math.floor(i / 4)).padStart(2,'0')}:${String((i * 15) % 60).padStart(2,'0')}`);
  return { timestamps: times, pcr: times.map(() => +(0.7 + Math.random() * 0.7).toFixed(3)) };
}

function mockSummary() {
  return {
    spot_price: SPOT, atm_strike: ATM, max_pain_strike: 22300,
    total_call_oi: 1842600, total_put_oi: 1654200,
    total_volume: 892400, pcr: 0.898,
  };
}

function mockTrap() {
  return {
    status: "YELLOW",
    message: "Moderate call concentration at 22700–22800. Watch for potential unwind if spot crosses 22750.",
    traps: [
      { strike: 22700, side: "CALLS", score: 62, oi: 84200, dominance: 0.81 },
      { strike: 22800, side: "CALLS", score: 54, oi: 67100, dominance: 0.78 },
      { strike: 22200, side: "PUTS",  score: 41, oi: 52300, dominance: 0.22 },
    ],
  };
}

function mockChain() {
  return {
    strikes: STRIKES,
    call_oi: STRIKES.map(s => Math.max(0, Math.round(9000 * Math.exp(-0.5 * ((s - ATM) / 400) ** 2) + Math.random() * 300))),
    put_oi:  STRIKES.map(s => Math.max(0, Math.round(8500 * Math.exp(-0.5 * ((s - ATM) / 350) ** 2) + Math.random() * 300))),
  };
}

function mockHistory() {
  return {

let backendOnline = false;

const api = async (path, opts = {}) => {
  // strip query params for mock lookup
  const basePath = path.split("?")[0];
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 3000);
    const res = await fetch(`${BASE_URL}${path}`, { ...opts, signal: controller.signal });
    clearTimeout(timer);
    backendOnline = true;
    // special iv-curve handling
    if (basePath === "/dashboard/iv-curve") {
      const d = await res.json();
      return d;
    }
    return await res.json();
  } catch {
    backendOnline = false;
    // special iv-curve mock
    if (basePath === "/dashboard/iv-curve") return mockIVCurve();
    if (basePath === "/fingerprint/compute") return mockFingerprint();
    if (basePath === "/ai/insight") return { insight: "⚠️ Backend offline — AI is unavailable. Start the backend with:\n\ncd codeforge\nuvicorn backend:app --reload --port 8000\n\nThen refresh this page." };
    const mockFn = MOCK_MAP[basePath];
    return mockFn ? mockFn() : null;
  }
};

function App() {
  const [page, setPage] = useState('dashboard');
  const [lang, setLang] = useState('en');
  const [isOnline, setIsOnline] = useState(false);
  const [lastRefresh, setLastRefresh] = useState(new Date());
  const t = T[lang];

  // Check backend status
  useEffect(() => {
    const check = () => {
      fetch(`${BASE_URL}/`, { signal: AbortSignal.timeout(2000) })
        .then(() => setIsOnline(true))
        .catch(() => setIsOnline(false));
    };
    check();
    const id = setInterval(check, 10000);
    return () => clearInterval(id);
  }, []);

  // Animated particle background
  useEffect(() => {
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);

    const particles = Array.from({ length: 55 }, () => ({
      x: Math.random() * canvas.width, y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 1.5 + 0.4, opacity: Math.random() * 0.5 + 0.1,
    }));

    let raf;
    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(99,102,241,${p.opacity})`;
        ctx.fill();
      });
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(99,102,241,${0.08 * (1 - dist / 120)})`;
            ctx.lineWidth = 0.5; ctx.stroke();
          }
        }
      }
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, []);

  const pages = [
    { key: 'dashboard',   label: t.dashboard },
    { key: 'fingerprint', label: t.fingerprint },
    { key: 'trap',        label: t.trap },
    { key: 'anomaly',     label: t.anomaly },
    { key: 'ai',          label: t.ai },
  ];

  return (
    <div>
      {/* NAVBAR */}
      <nav className="navbar">
        <div className="nav-logo">Options<span>AI</span></div>
        <div className="nav-center">
          {pages.map(p => (
            <button key={p.key} className={`nav-tab${page === p.key ? ' active' : ''}`} onClick={() => setPage(p.key)}>
              {p.label}
            </button>
          ))}
        </div>
        <div className="nav-right">
          {['en', 'hi', 'mr'].map(l => (
            <button key={l} className={`lang-btn${lang === l ? ' active' : ''}`} onClick={() => setLang(l)}>
              {l === 'en' ? 'EN' : l === 'hi' ? 'हि' : 'म'}
            </button>
          ))}
          <div className="live-badge">
            <div className="live-dot" style={{ background: isOnline ? 'var(--accent-green)' : 'var(--accent-yellow)' }} />
            {isOnline ? 'LIVE' : 'DEMO'}

      </nav>

      {/* STATUS BANNER */}

        <span>{isOnline ? '🟢' : '🟡'}</span>
        <span>{isOnline ? t.backendOnline : t.backendOffline}</span>
      </div>

      {/* MAIN */}

            <select className="filter-select">
              {EXPIRIES.map(e => <option key={e}>{e}</option>)}
            </select>
          </div>
          <div className="filter-group">
            <label>{t.dateRange}</label>
            <input type="date" className="filter-input" defaultValue="2025-01-01" />
            <div style={{ height: 6 }} />
            <input type="date" className="filter-input" defaultValue="2025-01-15" />
          </div>

          <div className="sidebar-divider" />

          <div className="stat-mini">
            <div className="stat-mini-row">
              <span className="stat-mini-label">BACKEND</span>
              <span className="stat-mini-value" style={{ fontSize: 11, color: isOnline ? 'var(--accent-green)' : 'var(--accent-yellow)' }}>
                {isOnline ? '● ONLINE' : '● OFFLINE'}
              </span>
            </div>
            <div className="stat-mini-row">
              <span className="stat-mini-label">AI ENGINE</span>
              <span className="stat-mini-value" style={{ fontSize: 11, color: 'var(--accent)' }}>MISTRAL-7B</span>
            </div>
            <div className="stat-mini-row">
              <span className="stat-mini-label">ML MODEL</span>
              <span className="stat-mini-value" style={{ fontSize: 11, color: 'var(--accent2)' }}>SKLEARN</span>
            </div>
            <div className="stat-mini-row">
              <span className="stat-mini-label">TRANSLATE</span>
              <span className="stat-mini-value" style={{ fontSize: 11, color: 'var(--accent3)' }}>MYMEMORY</span>
            </div>
          </div>

          <div className="sidebar-divider" />

          <button className="refresh-btn" onClick={() => setLastRefresh(new Date())}>{t.refresh}</button>
          <div style={{ fontFamily: 'var(--font-mono)', fontSize: 9, color: 'var(--text-muted)', textAlign: 'center' }}>
            {lastRefresh.toLocaleTimeString()}
          </div>
        </aside>

        {/* CONTENT */}
        <main className="content">
          {page === 'dashboard'   && <DashboardPage   lang={lang} isOnline={isOnline} key={`dash-${lastRefresh}`} />}
          {page === 'fingerprint' && <FingerprintPage lang={lang} />}
          {page === 'trap'        && <TrapPage        lang={lang} />}
          {page === 'anomaly'     && <AnomalyPage     lang={lang} />}
          {page === 'ai'          && <AIPage          lang={lang} isOnline={isOnline} />}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
